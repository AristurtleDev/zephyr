name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  ITCH_USER: ${{ secrets.ITCH_USER }}
  ITCH_SLUG: ${{ secrets.ITCH_SLUG }}

jobs:

  # ------------------------------------------------------------------
  # Windows x86_64
  # ------------------------------------------------------------------
  build-windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: zephyr-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/zephyr.exe

  # ------------------------------------------------------------------
  # Windows ARM64
  # ------------------------------------------------------------------
  build-windows-arm64:
    name: Windows ARM64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target aarch64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: zephyr-windows-arm64
          path: target/aarch64-pc-windows-msvc/release/zephyr.exe

  # ------------------------------------------------------------------
  # Linux x86_64
  # ------------------------------------------------------------------
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev

      - name: Build
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: zephyr-linux-x86_64
          path: target/release/zephyr

  # ------------------------------------------------------------------
  # Linux ARM64
  # ------------------------------------------------------------------
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev

      - name: Build
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: zephyr-linux-arm64
          path: target/release/zephyr

  # ------------------------------------------------------------------
  # macOS Universal
  # ------------------------------------------------------------------
  build-macos:
    name: macOS Universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust + targets
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build ARM64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/zephyr \
            target/x86_64-apple-darwin/release/zephyr \
            -output target/release/zephyr-universal

      - name: Assemble .app bundle
        run: |
          APP=Zephyr.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp target/release/zephyr-universal "$APP/Contents/MacOS/zephyr"
          chmod +x "$APP/Contents/MacOS/zephyr"

          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size src/assets/icon.png --out icon.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double src/assets/icon.png --out icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/AppIcon.icns"

          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$GITHUB_REF_TYPE" != "tag" ]; then
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi

          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDisplayName</key>
            <string>Zephyr</string>
            <key>CFBundleExecutable</key>
            <string>zephyr</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>com.zephyr-app.zephyr</string>
            <key>CFBundleName</key>
            <string>Zephyr</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSRequiresAquaSystemAppearance</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Package .app as zip
        run: zip -r --symlinks Zephyr-macOS-universal.zip Zephyr.app

      - uses: actions/upload-artifact@v4
        with:
          name: zephyr-macos-universal
          path: Zephyr-macOS-universal.zip

  # ------------------------------------------------------------------
  # Upload builds to itch.io using butler (only on tag pushes)
  # ------------------------------------------------------------------
  upload-itch:
    name: Upload to itch.io
    needs:
      - build-windows-x86_64
      - build-windows-arm64
      - build-linux-x86_64
      - build-linux-arm64
      - build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install butler
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip zip

          curl -L -o butler.zip "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          mkdir -p butler-bin
          unzip -o butler.zip -d butler-bin
          chmod +x butler-bin/butler
          echo "$PWD/butler-bin" >> "$GITHUB_PATH"

          butler version

      - name: Package artifacts for itch.io
        run: |
          cd artifacts

          # Windows: zip
          zip -j zephyr-windows-x86_64.zip zephyr-windows-x86_64/zephyr.exe
          zip -j zephyr-windows-arm64.zip  zephyr-windows-arm64/zephyr.exe

          # Linux: tar.gz
          tar -czf zephyr-linux-x86_64.tar.gz -C zephyr-linux-x86_64 zephyr
          tar -czf zephyr-linux-arm64.tar.gz  -C zephyr-linux-arm64  zephyr

          # macOS: zip already produced by build job
          cp zephyr-macos-universal/Zephyr-macOS-universal.zip .

      - name: Push to itch.io
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ITCH_GAME="${ITCH_USER}/${ITCH_SLUG}"

          butler push "artifacts/zephyr-windows-x86_64.zip" "$ITCH_GAME:windows-x86_64" --userversion "$VERSION"
          butler push "artifacts/zephyr-windows-arm64.zip"  "$ITCH_GAME:windows-arm64"  --userversion "$VERSION"

          butler push "artifacts/zephyr-linux-x86_64.tar.gz" "$ITCH_GAME:linux-x86_64" --userversion "$VERSION"
          butler push "artifacts/zephyr-linux-arm64.tar.gz"  "$ITCH_GAME:linux-arm64"  --userversion "$VERSION"

          butler push "artifacts/Zephyr-macOS-universal.zip" "$ITCH_GAME:macos-universal" --userversion "$VERSION"

  # ------------------------------------------------------------------
  # GitHub Release
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs:
      - upload-itch
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Create Release
        run: |
          TAG="${GITHUB_REF_NAME}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
